<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID.4 Charging Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #1a1e29; color: #8ba0b8; margin: 0; padding: 10px; }
        .app-container { max-w-md; margin: 0 auto; padding-bottom: 20px; }
        .box { background: #222736; border: 1px solid #2d3446; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .input-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; text-align: right; }
        .val-display { background: #1a1e29; border: 1px solid #2d3446; border-radius: 8px; padding: 12px; color: #fff; font-size: 18px; font-weight: 800; text-align: center; width: 100%; outline: none; }
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .btn-quick { flex: 1; background: #1a1e29; border: 1px solid #2d3446; border-radius: 8px; padding: 8px 0; font-size: 13px; color: #8ba0b8; cursor: pointer; text-align: center; }
        .btn-quick.active { border-color: #38bdf8; color: #38bdf8; }
        
        .timer-box { text-align: center; padding: 24px 16px; }
        .timer-text { font-size: 56px; font-weight: 800; color: #fff; line-height: 1; margin: 10px 0; letter-spacing: 2px;}
        
        .progress-container { background: #1a1e29; border-radius: 10px; height: 12px; width: 100%; margin: 20px 0 10px; overflow: hidden; position: relative; }
        .progress-bar { height: '100%'; background: linear-gradient(90deg, #38bdf8, #4ade80); width: 0%; transition: width 1s linear; }
        
        .action-btn { width: 100%; padding: 18px; border-radius: 12px; font-size: 20px; font-weight: 800; color: white; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-start { background: #38bdf8; }
        .btn-stop { background: #ef4444; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2d3446; border-radius: 12px; overflow: hidden; margin-bottom: 16px; border: 1px solid #2d3446;}
        .stat-item { background: #222736; padding: 16px; text-align: center; }
        .stat-val { font-size: 24px; font-weight: 800; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-container max-w-md mx-auto">
    
    <div class="flex gap-4 mb-4">
        <div class="box flex-1 mb-0 text-center py-3"><div class="text-[10px]">מותג</div><div class="text-white font-bold">Volkswagen</div></div>
        <div class="box flex-1 mb-0 text-center py-3"><div class="text-[10px]">דגם</div><div class="text-white font-bold">ID.4 / ID.5 Pro</div></div>
    </div>

    <div class="flex gap-4 mb-4">
        <div class="flex-1">
            <div class="input-title">קיבולת נטו (kWh)</div>
            <input type="number" id="capacity" class="val-display" value="77" onchange="calcStatic()">
        </div>
        <div class="flex-1">
            <div class="input-title">הספק עמדה (kW)</div>
            <input type="number" id="power" class="val-display" value="175" onchange="calcStatic()">
        </div>
    </div>
    
    <div class="btn-group mb-6">
        <button class="btn-quick" onclick="setPower(11, this)">ביתי (11)</button>
        <button class="btn-quick" onclick="setPower(50, this)">מהירה (50)</button>
        <button class="btn-quick active" onclick="setPower(175, this)">אולטרה (175)</button>
    </div>

    <div class="mb-4">
        <div class="input-title text-center">תעריף חשמל (₪)</div>
        <div class="flex gap-4">
            <input type="number" id="price" class="val-display flex-1" step="0.01" value="0.625" onchange="calcStatic()">
            <div class="flex gap-2 flex-1">
                <button class="btn-quick flex-1 active" onclick="setPrice(0.625, this)">בית</button>
                <button class="btn-quick flex-1" onclick="setPrice(2.00, this)">חוץ</button>
            </div>
        </div>
    </div>

    <div class="flex gap-4 mb-6">
        <div class="flex-1">
            <div class="input-title text-sky-400">אחוז נוכחי</div>
            <input type="number" id="current" class="val-display" value="79" onchange="calcStatic()">
        </div>
        <div class="flex-1">
            <div class="input-title text-green-400">יעד טעינה</div>
            <input type="number" id="target" class="val-display" value="80" onchange="calcStatic()">
        </div>
    </div>

    <div class="box timer-box">
        <div class="text-[12px]">זמן שחלף (HH:MM:SS)</div>
        <div id="timerDisplay" class="timer-text">00:00:00</div>
        <div id="estFinish" class="text-sky-400 font-bold text-sm mb-2">סיום משוער ב: --:--</div>
        
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="progressText" class="text-sky-400 text-[12px] font-bold">מצב סוללה: 79.0%</div>
    </div>

    <button id="actionBtn" class="action-btn btn-start mb-6" onclick="toggleTimer()">התחל מדידה</button>

    <div class="stats-grid">
        <div class="stat-item">
            <div class="text-[10px]">עלות בפועל</div>
            <div id="liveCost" class="stat-val text-green-400">₪0.00</div>
        </div>
        <div class="stat-item">
            <div class="text-[10px]">אנרגיה שנכנסה</div>
            <div id="liveKwh" class="stat-val text-sky-200">kWh 0.00</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <div class="text-[10px]">עלות (הערכה)</div>
            <div id="estCost" class="stat-val text-green-400/50">₪0.00</div>
        </div>
        <div class="stat-item">
            <div class="text-[10px]">תוספת טווח</div>
            <div id="estRange" class="stat-val text-sky-200/50">+0 ק"מ</div>
        </div>
    </div>

    <div class="text-center text-[10px] text-slate-600 mt-4">eldadmo.github.io</div>
</div>

<script>
    let state = {
        timer: null,
        secondsPassed: 0,
        isRunning: false
    };

    // Quick set buttons
    function setPower(val, btn) {
        document.getElementById('power').value = val;
        document.querySelectorAll('.btn-group .btn-quick').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calcStatic();
    }

    function setPrice(val, btn) {
        document.getElementById('price').value = val;
        btn.parentElement.querySelectorAll('.btn-quick').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calcStatic();
    }

    // Static calculations (Before starting)
    function calcStatic() {
        if (state.isRunning) return; // Don't override while running

        const cap = parseFloat(document.getElementById('capacity').value) || 77;
        const pwr = parseFloat(document.getElementById('power').value) || 11;
        const prc = parseFloat(document.getElementById('price').value) || 0.625;
        const cur = parseFloat(document.getElementById('current').value) || 0;
        const tar = parseFloat(document.getElementById('target').value) || 80;

        document.getElementById('progressBar').style.width = cur + '%';
        document.getElementById('progressText').innerText = `מצב סוללה: ${cur.toFixed(1)}%`;

        if (cur >= tar) {
            document.getElementById('estFinish').innerText = "יעד הושג";
            document.getElementById('estCost').innerText = "₪0.00";
            document.getElementById('estRange').innerText = "+0 ק\"מ";
            return;
        }

        const energyNeeded = ((tar - cur) / 100) * cap;
        const hours = energyNeeded / (pwr * 0.9); // 90% efficiency

        const estDate = new Date(Date.now() + hours * 3600000);
        document.getElementById('estFinish').innerText = `סיום משוער ב: ${estDate.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}`;
        document.getElementById('estCost').innerText = `₪${(energyNeeded * prc).toFixed(2)}`;
        document.getElementById('estRange').innerText = `+${Math.round(energyNeeded / 0.185)} ק"מ`;
    }

    // Timer Logic
    function toggleTimer() {
        const btn = document.getElementById('actionBtn');
        
        if (state.isRunning) {
            // STOP
            clearInterval(state.timer);
            state.isRunning = false;
            btn.innerText = 'התחל מדידה';
            btn.className = 'action-btn btn-start mb-6';
        } else {
            // START
            const cur = parseFloat(document.getElementById('current').value) || 0;
            const tar = parseFloat(document.getElementById('target').value) || 80;
            
            if (cur >= tar) return; // Don't start if already at target

            state.isRunning = true;
            state.secondsPassed = 0;
            btn.innerText = 'עצור מדידה';
            btn.className = 'action-btn btn-stop mb-6';
            
            calcStatic(); // Set initial estimates
            
            state.timer = setInterval(tick, 1000);
        }
    }

    function tick() {
        state.secondsPassed++;
        
        // Format Timer Display
        const hrs = Math.floor(state.secondsPassed / 3600);
        const mins = Math.floor((state.secondsPassed % 3600) / 60);
        const secs = state.secondsPassed % 60;
        document.getElementById('timerDisplay').innerText = 
            `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        // Live Calculations
        const cap = parseFloat(document.getElementById('capacity').value) || 77;
        const pwr = parseFloat(document.getElementById('power').value) || 11;
        const prc = parseFloat(document.getElementById('price').value) || 0.625;
        const startCur = parseFloat(document.getElementById('current').value) || 0;
        const tar = parseFloat(document.getElementById('target').value) || 80;

        // Energy added so far = (Power * Efficiency) * (Hours passed)
        const hoursPassed = state.secondsPassed / 3600;
        const kwhAdded = (pwr * 0.9) * hoursPassed;
        const addedPct = (kwhAdded / cap) * 100;
        const currentLiveSoc = startCur + addedPct;

        // Guard Clause: STOP WHEN TARGET REACHED
        if (currentLiveSoc >= tar) {
            clearInterval(state.timer);
            state.isRunning = false;
            
            const btn = document.getElementById('actionBtn');
            btn.innerText = 'התחל מדידה';
            btn.className = 'action-btn btn-start mb-6';

            // Cap the values exactly to the target to avoid going over
            const exactKwhNeeded = ((tar - startCur) / 100) * cap;
            document.getElementById('liveKwh').innerText = `kWh ${exactKwhNeeded.toFixed(2)}`;
            document.getElementById('liveCost').innerText = `₪${(exactKwhNeeded * prc).toFixed(2)}`;
            document.getElementById('progressBar').style.width = tar + '%';
            document.getElementById('progressText').innerText = `מצב סוללה: ${tar.toFixed(1)}% (הושלם)`;
            document.getElementById('estFinish').innerText = "הטעינה הסתיימה";
            return;
        }

        // Update Live UI
        document.getElementById('liveKwh').innerText = `kWh ${kwhAdded.toFixed(2)}`;
        document.getElementById('liveCost').innerText = `₪${(kwhAdded * prc).toFixed(2)}`;
        document.getElementById('progressBar').style.width = currentLiveSoc + '%';
        document.getElementById('progressText').innerText = `מצב סוללה: ${currentLiveSoc.toFixed(1)}%`;
    }

    // Init
    calcStatic();
</script>

</body>
</html>
