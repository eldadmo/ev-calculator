<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Control Pro - ID.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: #334155; border: 1px solid #475569; border-radius: 12px; padding: 10px; width: 100%; color: white; font-size: 0.875rem; }
        .tab-active { border-bottom: 3px solid #38bdf8; color: #38bdf8; font-weight: 800; }
        .tab-inactive { color: #94a3b8; }
        .card-stat { background: rgba(51, 65, 85, 0.4); border-radius: 16px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-toggle { background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 4px 12px; font-size: 0.75rem; transition: all 0.2s; }
        .btn-toggle.active { background: #38bdf8; border-color: #38bdf8; color: #0f172a; font-weight: bold; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <header class="text-center mb-4">
        <h1 class="text-2xl font-extrabold italic uppercase tracking-tighter">EV<span class="text-sky-400">Control</span> Pro</h1>
    </header>

    <div class="flex space-x-4 space-x-reverse mb-6 w-full max-w-lg justify-center border-b border-slate-700">
        <button id="tabCalcBtn" onclick="switchTab('calc')" class="pb-2 px-4 tab-active transition-all">מחשבון מהיר</button>
        <button id="tabPlanBtn" onclick="switchTab('plan')" class="pb-2 px-4 tab-inactive transition-all">מתכנן (Planner)</button>
    </div>

    <main class="glass p-6 rounded-3xl w-full max-w-lg shadow-2xl">
        
        <div class="grid grid-cols-2 gap-3 mb-6 border-b border-slate-700 pb-4">
            <div class="col-span-2">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">דגם רכב</label>
                <select id="carModel" class="input-style" onchange="updateCarData()">
                    <option value="vw_id4">VW ID.4 (77kWh net)</option>
                    <option value="byd_atto3">BYD Atto 3 (60.5kWh)</option>
                    <option value="tesla_m3_rwd">Tesla Model 3 RWD (57.5kWh)</option>
                    <option value="custom">אחר...</option>
                </select>
                <input type="hidden" id="capacity" value="77">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1">הספק עמדה (kW)</label>
                <input type="number" id="power" class="input-style" value="11" oninput="calculate()">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1">סוג תעריף</label>
                <div class="flex gap-2">
                    <button id="rateHome" onclick="setRate(0.625, 'home')" class="btn-toggle active w-1/2">בית</button>
                    <button id="ratePublic" onclick="setRate(2.2, 'public')" class="btn-toggle w-1/2">ציבורי</button>
                </div>
                <input type="hidden" id="kwhPrice" value="0.625">
            </div>
        </div>

        <div id="calcView" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-sky-400 mb-2 italic text-center">אחוז נוכחי</label>
                    <input type="range" id="calcCurrentRange" min="0" max="100" value="20" class="w-full" oninput="syncInputs('current', this.value)">
                    <input type="number" id="calcCurrentNum" class="input-style mt-2 text-center" value="20" oninput="syncInputs('current', this.value)">
                </div>
                <div>
                    <label class="block text-xs font-bold text-green-400 mb-2 italic text-center">יעד טעינה</label>
                    <input type="range" id="calcTargetRange" min="0" max="100" value="80" class="w-full" oninput="syncInputs('target', this.value)">
                    <input type="number" id="calcTargetNum" class="input-style mt-2 text-center" value="80" oninput="syncInputs('target', this.value)">
                </div>
            </div>
            <div class="text-center py-6 bg-slate-800/40 rounded-2xl border border-slate-700">
                <p class="text-xs text-slate-400 uppercase">שעת סיום משוערת:</p>
                <p id="calcFinishTime" class="text-5xl font-black text-white mt-1">--:--</p>
                <div class="flex justify-center gap-4 mt-2">
                    <p id="calcDuration" class="text-xs text-sky-400 font-bold"></p>
                    <p id="calcEnergy" class="text-xs text-green-400 font-bold"></p>
                </div>
            </div>
        </div>

        <div id="planView" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 italic">מצב נוכחי (%)</label>
                    <input type="number" id="planCurrent" class="input-style" value="20" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 italic">שעת יציאה רצויה</label>
                    <input type="time" id="departureTime" class="input-style" value="07:30" oninput="calculate()">
                </div>
            </div>
            <div class="text-center py-8 bg-sky-500/10 rounded-2xl border border-sky-500/30">
                <p class="text-xs text-sky-300 font-bold uppercase">חבר את הכבל לא יאוחר מ:</p>
                <p id="startTimeNeeded" class="text-5xl font-black text-white mt-1">--:--</p>
                <p id="statusNote" class="text-[10px] mt-3 italic"></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-6">
            <div class="card-stat text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold">עלות הטעינה</p>
                <p id="totalCost" class="text-xl font-extrabold text-green-400">₪0.00</p>
            </div>
            <div class="card-stat text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold">תוספת טווח (משוער)</p>
                <p id="addedRange" class="text-xl font-extrabold text-sky-300">+0 ק"מ</p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="https://www.buymeacoffee.com/eldadm" target="_blank" class="text-[11px] text-slate-500 hover:text-sky-400 transition-colors flex items-center justify-center gap-2">
                <span>אהבת? מוזמן לפרגן בקפה ☕</span>
            </a>
        </div>

    </main>

    <footer class="mt-6 text-[9px] text-slate-600 text-center uppercase tracking-widest">
        Developed for the IL EV Community
    </footer>

    <script>
        let currentTab = 'calc';
        const evModels = { "vw_id4": 77, "byd_atto3": 60.5, "tesla_m3_rwd": 57.5 };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('calcView').classList.toggle('hidden', tab !== 'calc');
            document.getElementById('planView').classList.toggle('hidden', tab !== 'plan');
            document.getElementById('tabCalcBtn').className = (tab === 'calc' ? 'pb-2 px-4 tab-active' : 'pb-2 px-4 tab-inactive');
            document.getElementById('tabPlanBtn').className = (tab === 'plan' ? 'pb-2 px-4 tab-active' : 'pb-2 px-4 tab-inactive');
            calculate();
        }

        function setRate(price, type) {
            document.getElementById('kwhPrice').value = price;
            document.getElementById('rateHome').className = `btn-toggle w-1/2 ${type === 'home' ? 'active' : ''}`;
            document.getElementById('ratePublic').className = `btn-toggle w-1/2 ${type === 'public' ? 'active' : ''}`;
            calculate();
        }

        function syncInputs(type, val) {
            if (type === 'current') {
                document.getElementById('calcCurrentRange').value = val;
                document.getElementById('calcCurrentNum').value = val;
            } else {
                document.getElementById('calcTargetRange').value = val;
                document.getElementById('calcTargetNum').value = val;
            }
            calculate();
        }

        function updateCarData() {
            const m = document.getElementById('carModel').value;
            if (m !== 'custom') document.getElementById('capacity').value = evModels[m];
            calculate();
        }

        function calculate() {
            const capacity = parseFloat(document.getElementById('capacity').value) || 77;
            const power = parseFloat(document.getElementById('power').value) || 11;
            const price = parseFloat(document.getElementById('kwhPrice').value) || 0.625;
            const efficiency = 0.9;

            let current, target;
            if (currentTab === 'calc') {
                current = parseFloat(document.getElementById('calcCurrentNum').value) || 0;
                target = parseFloat(document.getElementById('calcTargetNum').value) || 80;
            } else {
                current = parseFloat(document.getElementById('planCurrent').value) || 0;
                target = 80; 
            }

            const energyNeeded = Math.max(0, ((target - current) / 100) * capacity);
            const hoursNeeded = energyNeeded / (power * efficiency);

            document.getElementById('totalCost').innerText = `₪${(energyNeeded * price).toFixed(2)}`;
            document.getElementById('addedRange').innerText = `+${Math.round(energyNeeded / 0.185)} ק"מ`;

            if (currentTab === 'calc') {
                const finishDate = new Date(new Date().getTime() + hoursNeeded * 3600000);
                document.getElementById('calcFinishTime').innerText = finishDate.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('calcDuration').innerText = `זמן נותר: ${Math.floor(hoursNeeded)}ש' ו-${Math.round((hoursNeeded % 1) * 60)}ד'`;
                document.getElementById('calcEnergy').innerText = `להשלים: ${energyNeeded.toFixed(1)} kWh`;
            } else {
                const depTimeStr = document.getElementById('departureTime').value;
                const [h, m] = depTimeStr.split(':');
                let depDate = new Date();
                depDate.setHours(h, m, 0);
                if (depDate < new Date()) depDate.setDate(depDate.getDate() + 1);

                const startDate = new Date(depDate.getTime() - (hoursNeeded * 3600000));
                document.getElementById('startTimeNeeded').innerText = startDate.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                
                const status = document.getElementById('statusNote');
                if (startDate < new Date()) {
                    status.innerText = "⚠️ איחור: זמן הטעינה ארוך מהזמן שנותר";
                    status.className = "text-[10px] mt-2 italic text-red-400";
                } else {
                    status.innerText = "הטעינה תסתיים בדיוק בזמן ליציאה";
                    status.className = "text-[10px] mt-2 italic text-slate-400";
                }
            }
        }

        updateCarData();
    </script>
</body>
</html>
