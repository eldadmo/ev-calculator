<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charge & Plan - ID.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #171923; color: #f8fafc; }
        .glass { background: #202430; border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-style { background: #2d3243; border: 1px solid #4a5568; border-radius: 0.75rem; padding: 12px; width: 100%; color: white; text-align: center; font-size: 1.125rem; font-weight: bold;}
        .input-style:focus { border-color: #38bdf8; outline: none; }
        .label-style { display: block; font-size: 0.7rem; font-weight: bold; color: #718096; text-transform: uppercase; margin-bottom: 0.25rem; text-align: center; }
        .tab-btn { padding: 0.75rem; font-weight: bold; border-radius: 0.75rem; transition: all 0.2s; cursor: pointer; text-align: center; }
        .tab-active { background: #38bdf8; color: #0f172a; }
        .tab-inactive { background: #2d3243; color: #94a3b8; }
        .timer-display { font-size: 3.5rem; font-weight: 800; line-height: 1; margin: 1rem 0; letter-spacing: 2px;}
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <main class="glass p-6 w-full max-w-md shadow-2xl">
        
        <div class="grid grid-cols-3 gap-3 mb-6">
            <div>
                <label class="label-style">קיבולת נטו (kWh)</label>
                <input type="number" id="capacity" class="input-style" value="77" oninput="calculate()">
            </div>
            <div>
                <label class="label-style">הספק (kW)</label>
                <input type="number" id="power" class="input-style" value="11" oninput="calculate()">
            </div>
            <div>
                <label class="label-style">תעריף (₪)</label>
                <input type="number" step="0.01" id="kwhPrice" class="input-style" value="0.625" oninput="calculate()">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6 bg-slate-800/50 p-1 rounded-2xl">
            <div id="tabCalc" class="tab-btn tab-active" onclick="switchTab('calc')">מדידה חיה</div>
            <div id="tabPlan" class="tab-btn tab-inactive" onclick="switchTab('plan')">תכנון נסיעה</div>
        </div>

        <div id="viewCalc" class="block">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="label-style text-sky-400">אחוז נוכחי</label>
                    <input type="number" id="calcCurrent" class="input-style" value="20" oninput="calculate()">
                </div>
                <div>
                    <label class="label-style text-green-400">יעד טעינה</label>
                    <input type="number" id="calcTarget" class="input-style" value="80" oninput="calculate()">
                </div>
            </div>

            <div class="bg-[#1a202c] p-6 rounded-2xl border border-slate-700 text-center mb-6 shadow-inner">
                <p class="text-xs font-bold text-slate-500 uppercase">זמן שחלף / נותר</p>
                <div id="mainDisplay" class="timer-display text-white">00:00:00</div>
                <p id="subDisplay" class="text-sm font-bold text-sky-400">סיום משוער ב: --:--</p>
                
                <button id="btnToggleTimer" onclick="toggleTimer()" class="mt-6 w-full py-4 rounded-xl font-bold text-lg text-white bg-sky-600 hover:bg-sky-500 transition-colors shadow-lg shadow-sky-900/50">
                    התחל מדידה
                </button>
            </div>
        </div>

        <div id="viewPlan" class="hidden">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="label-style text-sky-400">אחוז נוכחי</label>
                    <input type="number" id="planCurrent" class="input-style" value="20" oninput="calculate()">
                </div>
                <div>
                    <label class="label-style text-green-400">יעד טעינה</label>
                    <input type="number" id="planTarget" class="input-style" value="80" oninput="calculate()">
                </div>
            </div>

            <div class="bg-[#1a202c] p-6 rounded-2xl border border-slate-700 text-center mb-6">
                <label class="label-style mb-4 text-white">מתי אתה צריך לצאת?</label>
                <input type="time" id="departureTime" class="input-style text-2xl mb-6 bg-slate-800" value="07:30" oninput="calculate()">
                
                <p class="text-xs text-slate-400 uppercase font-bold">כדי לצאת בזמן, חבר את הרכב עד:</p>
                <div id="planStartTime" class="text-4xl font-black text-white mt-2 mb-2">--:--</div>
                <p id="planStatus" class="text-xs font-bold text-green-400"></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-800/40 p-4 rounded-xl text-center border border-slate-700/50">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">תוספת טווח (הערכה)</p>
                <p id="sumRange" class="text-xl font-bold text-sky-300">+0 ק"מ</p>
            </div>
            <div class="bg-slate-800/40 p-4 rounded-xl text-center border border-slate-700/50">
                <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">עלות טעינה צפויה</p>
                <p id="sumCost" class="text-xl font-bold text-green-400">₪0.00</p>
            </div>
        </div>

    </main>

    <script>
        // ניהול State של האפליקציה
        const state = {
            currentTab: 'calc',
            timer: null,
            secondsPassed: 0
        };

        // החלפת לשוניות
        function switchTab(tab) {
            state.currentTab = tab;
            
            if (tab === 'calc') {
                document.getElementById('tabCalc').className = 'tab-btn tab-active';
                document.getElementById('tabPlan').className = 'tab-btn tab-inactive';
                document.getElementById('viewCalc').classList.remove('hidden');
                document.getElementById('viewPlan').classList.add('hidden');
            } else {
                document.getElementById('tabPlan').className = 'tab-btn tab-active';
                document.getElementById('tabCalc').className = 'tab-btn tab-inactive';
                document.getElementById('viewPlan').classList.remove('hidden');
                document.getElementById('viewCalc').classList.add('hidden');
            }
            calculate();
        }

        // ניהול טיימר אקטיבי (סטופר)
        function toggleTimer() {
            const btn = document.getElementById('btnToggleTimer');
            
            if (state.timer) {
                // עצירת המדידה
                clearInterval(state.timer);
                state.timer = null;
                btn.innerText = 'התחל מדידה';
                btn.classList.replace('bg-red-500', 'bg-sky-600');
                btn.classList.replace('hover:bg-red-400', 'hover:bg-sky-500');
                btn.classList.replace('shadow-red-900/50', 'shadow-sky-900/50');
            } else {
                // התחלת המדידה
                state.secondsPassed = 0;
                btn.innerText = 'עצור מדידה';
                btn.classList.replace('bg-sky-600', 'bg-red-500');
                btn.classList.replace('hover:bg-sky-500', 'hover:bg-red-400');
                btn.classList.replace('shadow-sky-900/50', 'shadow-red-900/50');
                
                state.timer = setInterval(() => {
                    state.secondsPassed++;
                    updateTimerDisplay();
                    // בחיים האמיתיים פה נמשוך אחוז עדכני מה-API. כרגע נשתמש בנתון הסטטי מהקלט
                    calculate();
                }, 1000);
            }
        }

        function updateTimerDisplay() {
            const hrs = Math.floor(state.secondsPassed / 3600);
            const mins = Math.floor((state.secondsPassed % 3600) / 60);
            const secs = state.secondsPassed % 60;
            document.getElementById('mainDisplay').innerText = 
                `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // פונקציית הליבה - החישוב
        function calculate() {
            const cap = parseFloat(document.getElementById('capacity').value) || 77;
            const pwr = parseFloat(document.getElementById('power').value) || 11;
            const prc = parseFloat(document.getElementById('kwhPrice').value) || 0.625;
            
            let cur = parseFloat(document.getElementById(state.currentTab === 'calc' ? 'calcCurrent' : 'planCurrent').value) || 0;
            let tar = parseFloat(document.getElementById(state.currentTab === 'calc' ? 'calcTarget' : 'planTarget').value) || 80;

            // --- Guard Clause: עצירה כשהסוללה מלאה/ביעד ---
            if (cur >= tar) {
                document.getElementById('sumCost').innerText = `₪0.00`;
                document.getElementById('sumRange').innerText = `+0 ק"מ`;
                
                if (state.currentTab === 'calc') {
                    if (!state.timer) {
                        document.getElementById('mainDisplay').innerText = "מוכן!";
                    }
                    document.getElementById('subDisplay').innerText = "הטעינה הסתיימה";
                    document.getElementById('subDisplay').classList.replace('text-sky-400', 'text-green-400');
                    
                    // עצירת הטיימר בפועל אם הוא רץ
                    if (state.timer) {
                        clearInterval(state.timer);
                        state.timer = null;
                        const btn = document.getElementById('btnToggleTimer');
                        btn.innerText = 'התחל מדידה';
                        btn.classList.replace('bg-red-500', 'bg-sky-600');
                        btn.classList.replace('hover:bg-red-400', 'hover:bg-sky-500');
                        btn.classList.replace('shadow-red-900/50', 'shadow-sky-900/50');
                    }
                } else if (state.currentTab === 'plan') {
                    document.getElementById('planStartTime').innerText = "--:--";
                    document.getElementById('planStatus').innerText = "הסוללה כבר ביעד";
                    document.getElementById('planStatus').classList.remove('text-red-400');
                    document.getElementById('planStatus').classList.add('text-green-400');
                }
                return; // יוצאים מהפונקציה
            }

            // חישובים רגילים אם לא הגענו ליעד
            document.getElementById('subDisplay').classList.replace('text-green-400', 'text-sky-400');
            const energy = Math.max(0, ((tar - cur) / 100) * cap);
            const hours = energy / (pwr * 0.9); // 90% יעילות

            document.getElementById('sumCost').innerText = `₪${(energy * prc).toFixed(2)}`;
            document.getElementById('sumRange').innerText = `+${Math.round(energy / 0.185)} ק"מ`;

            // עדכון UI לפי הלשונית הפעילה
            if (state.currentTab === 'calc') {
                if (!state.timer) {
                    const hh = Math.floor(hours);
                    const mm = Math.round((hours % 1) * 60);
                    document.getElementById('mainDisplay').innerText = `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:00`;
                }
                document.getElementById('subDisplay').innerText = `סיום משוער ב: ${new Date(Date.now() + hours*3600000).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'})}`;
            
            } else if (state.currentTab === 'plan') {
                const [h, m] = document.getElementById('departureTime').value.split(':');
                let dep = new Date(); dep.setHours(h, m, 0);
                if (dep < new Date()) dep.setDate(dep.getDate()+1); // אם השעה כבר עברה, מתכננים למחר
                
                const start = new Date(dep.getTime() - hours * 3600000);
                document.getElementById('planStartTime').innerText = start.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                
                const statusEl = document.getElementById('planStatus');
                if (start < new Date()) {
                    statusEl.innerText = "⚠️ איחור בלו\"ז - לא תספיק להטעין הכל";
                    statusEl.classList.remove('text-green-400');
                    statusEl.classList.add('text-red-400');
                } else {
                    statusEl.innerText = "זמן תקין לחיבור";
                    statusEl.classList.remove('text-red-400');
                    statusEl.classList.add('text-green-400');
                }
            }
        }

        // הרצה ראשונית
        calculate();
    </script>
</body>
</html>
