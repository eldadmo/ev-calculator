<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Control Pro - ID.4 Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: #334155; border: 1px solid #475569; border-radius: 12px; padding: 10px; width: 100%; color: white; font-size: 0.875rem; text-align: center; }
        .tab-active { border-bottom: 3px solid #38bdf8; color: #38bdf8; font-weight: 800; }
        .tab-inactive { color: #94a3b8; }
        .card-stat { background: rgba(51, 65, 85, 0.4); border-radius: 16px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-action { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; font-weight: 800; border-radius: 12px; padding: 12px; width: 100%; transition: all 0.2s; shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
        .btn-action:active { transform: scale(0.98); }
        .btn-stop { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <header class="text-center mb-4">
        <h1 class="text-2xl font-extrabold italic uppercase tracking-tighter">EV<span class="text-sky-400">Control</span> Pro</h1>
    </header>

    <div class="flex space-x-4 space-x-reverse mb-6 w-full max-w-lg justify-center border-b border-slate-700 text-sm">
        <button id="tabCalcBtn" onclick="switchTab('calc')" class="pb-2 px-4 tab-active">מחשבון & מדידה</button>
        <button id="tabPlanBtn" onclick="switchTab('plan')" class="pb-2 px-4 tab-inactive">מתכנן (Planner)</button>
    </div>

    <main class="glass p-6 rounded-3xl w-full max-w-lg shadow-2xl">
        
        <div class="grid grid-cols-2 gap-3 mb-6 border-b border-slate-700 pb-4">
            <div class="col-span-2">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">דגם וקיבולת נטו (kWh)</label>
                <div class="flex gap-2">
                    <select id="carModel" class="input-style w-2/3" onchange="updateCarData()">
                        <option value="vw_id4">VW ID.4 (77kWh)</option>
                        <option value="byd_atto3">BYD Atto 3 (60.5kWh)</option>
                        <option value="tesla_m3">Tesla M3 RWD (57.5kWh)</option>
                        <option value="custom">מותאם אישית...</option>
                    </select>
                    <input type="number" id="capacity" class="input-style w-1/3" value="77" oninput="calculate()">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1">הספק עמדה (kW)</label>
                <input type="number" id="power" class="input-style" value="11" oninput="calculate()">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1">תעריף לקוט"ש (₪)</label>
                <input type="number" id="kwhPrice" class="input-style" value="0.625" step="0.01" oninput="calculate()">
            </div>
        </div>

        <div id="calcView" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-sky-400 mb-2 italic text-center">אחוז נוכחי</label>
                    <input type="number" id="calcCurrentNum" class="input-style" value="20" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-green-400 mb-2 italic text-center">יעד טעינה</label>
                    <input type="number" id="calcTargetNum" class="input-style" value="80" oninput="calculate()">
                </div>
            </div>

            <div class="py-6 bg-slate-800/40 rounded-2xl border border-slate-700 text-center">
                <p class="text-xs text-slate-400 uppercase">זמן טעינה נותר:</p>
                <p id="calcFinishTime" class="text-5xl font-black text-white mt-1">--:--</p>
                <p id="calcDuration" class="text-xs text-sky-400 font-bold mt-2"></p>
            </div>

            <button id="startBtn" onclick="toggleTimer()" class="btn-action">התחל טעינה (מדידה)</button>
            <div id="timerDisplay" class="hidden text-center p-4 bg-sky-500/10 rounded-xl border border-sky-500/20">
                <p class="text-[10px] text-sky-300 font-bold">טוען עכשיו...</p>
                <p id="liveTimer" class="text-2xl font-mono font-bold">00:00:00</p>
                <p id="liveEnergy" class="text-xs text-slate-400 mt-1">נכנסו: 0.00 kWh</p>
            </div>
        </div>

        <div id="planView" class="hidden space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 italic">מצב נוכחי (%)</label>
                    <input type="number" id="planCurrent" class="input-style" value="20" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 italic">שעת יציאה</label>
                    <input type="time" id="departureTime" class="input-style" value="07:30" oninput="calculate()">
                </div>
            </div>
            <div class="text-center py-8 bg-sky-500/10 rounded-2xl border border-sky-500/30">
                <p class="text-xs text-sky-300 font-bold uppercase">חבר את הכבל ב:</p>
                <p id="startTimeNeeded" class="text-5xl font-black text-white mt-1">--:--</p>
                <p id="statusNote" class="text-[10px] mt-3 italic"></p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-6">
            <div class="card-stat text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold">עלות משוערת</p>
                <p id="totalCost" class="text-xl font-extrabold text-green-400">₪0.00</p>
            </div>
            <div class="card-stat text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold">תוספת טווח</p>
                <p id="addedRange" class="text-xl font-extrabold text-sky-300">+0 ק"מ</p>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="https://www.buymeacoffee.com/eldadm" target="_blank" class="text-[10px] text-slate-500 hover:text-sky-400 transition-colors">
                אהבת? פרגן בקפה ☕
            </a>
        </div>
    </main>

    <script>
        let currentTab = 'calc';
        let timerInterval = null;
        let startTime = null;
        const evModels = { "vw_id4": 77, "byd_atto3": 60.5, "tesla_m3": 57.5 };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('calcView').classList.toggle('hidden', tab !== 'calc');
            document.getElementById('planView').classList.toggle('hidden', tab !== 'plan');
            document.getElementById('tabCalcBtn').className = (tab === 'calc' ? 'pb-2 px-4 tab-active' : 'pb-2 px-4 tab-inactive');
            document.getElementById('tabPlanBtn').className = (tab === 'plan' ? 'pb-2 px-4 tab-active' : 'pb-2 px-4 tab-inactive');
            calculate();
        }

        function updateCarData() {
            const m = document.getElementById('carModel').value;
            if (m !== 'custom') document.getElementById('capacity').value = evModels[m];
            calculate();
        }

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            const display = document.getElementById('timerDisplay');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "התחל טעינה (מדידה)";
                btn.classList.remove('btn-stop');
                display.classList.add('hidden');
            } else {
                startTime = Date.now();
                display.classList.remove('hidden');
                btn.innerText = "עצור מדידה";
                btn.classList.add('btn-stop');
                timerInterval = setInterval(updateLiveTimer, 1000);
            }
        }

        function updateLiveTimer() {
            const elapsed = Date.now() - startTime;
            const s = Math.floor(elapsed / 1000);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            document.getElementById('liveTimer').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            
            const power = parseFloat(document.getElementById('power').value) || 11;
            const energy = (s / 3600) * power * 0.9;
            document.getElementById('liveEnergy').innerText = `נכנסו: ${energy.toFixed(2)} kWh`;
        }

        function calculate() {
            const capacity = parseFloat(document.getElementById('capacity').value) || 77;
            const power = parseFloat(document.getElementById('power').value) || 11;
            const price = parseFloat(document.getElementById('kwhPrice').value) || 0.625;
            const efficiency = 0.9;

            let cur = currentTab === 'calc' ? parseFloat(document.getElementById('calcCurrentNum').value) : parseFloat(document.getElementById('planCurrent').value);
            let target = currentTab === 'calc' ? parseFloat(document.getElementById('calcTargetNum').value) : 80;

            const energy = Math.max(0, ((target - cur) / 100) * capacity);
            const hours = energy / (power * efficiency);

            document.getElementById('totalCost').innerText = `₪${(energy * price).toFixed(2)}`;
            document.getElementById('addedRange').innerText = `+${Math.round(energy / 0.185)} ק"מ`;

            if (currentTab === 'calc') {
                const finish = new Date(Date.now() + hours * 3600000);
                document.getElementById('calcFinishTime').innerText = finish.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                document.getElementById('calcDuration').innerText = `משך: ${Math.floor(hours)}ש' ו-${Math.round((hours%1)*60)}ד'`;
            } else {
                const [h, min] = document.getElementById('departureTime').value.split(':');
                let dep = new Date(); dep.setHours(h, min, 0);
                if (dep < new Date()) dep.setDate(dep.getDate()+1);
                const start = new Date(dep.getTime() - hours * 3600000);
                document.getElementById('startTimeNeeded').innerText = start.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
            }
        }
        calculate();
    </script>
</body>
</html>
